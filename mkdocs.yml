site_name: qreals
site_description: q-deformed rationals and reals via MGO continued fractions
site_author: Patrick Taylor
repo_url: https://github.com/patrickt6/qreals
repo_name: patrickt6/qreals
copyright: MIT licensed

docs_dir: docs

theme:
  name: material
  palette:
    scheme: default
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight
    - toc.follow

markdown_extensions:
  - admonition
  - tables
  - footnotes
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_root_heading: true
            show_source: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - The MGO construction: math.md
  - Correctness and proofs: CORRECTNESS.md
  - API reference: api.md
